<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ThumbTack{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="mobile-logo">
            <svg viewBox="0 0 100 100" width="22" height="22"><rect x="22" y="32" width="12" height="58" rx="5.5" fill="white"/><circle cx="28" cy="20" r="12" fill="white"/><rect x="34" y="42" width="10" height="5.5" rx="2" fill="white" opacity="0.9"/><rect x="66" y="32" width="12" height="58" rx="5.5" fill="white"/><circle cx="72" cy="20" r="12" fill="white"/><rect x="56" y="42" width="10" height="5.5" rx="2" fill="white" opacity="0.9"/><circle cx="50" cy="50" r="7" fill="white" opacity="0.95"/></svg>
            <span>ThumbTack</span>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </header>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="glass"></div>
                <div class="gloss"></div>
                <div class="gleam"></div>
                <div class="rim"></div>
                <svg viewBox="0 0 100 100" width="22" height="22"><rect x="22" y="32" width="12" height="58" rx="5.5" fill="white"/><circle cx="28" cy="20" r="12" fill="white"/><rect x="34" y="42" width="10" height="5.5" rx="2" fill="white" opacity="0.9"/><rect x="66" y="32" width="12" height="58" rx="5.5" fill="white"/><circle cx="72" cy="20" r="12" fill="white"/><rect x="56" y="42" width="10" height="5.5" rx="2" fill="white" opacity="0.9"/><circle cx="50" cy="50" r="7" fill="white" opacity="0.95"/></svg>
            </div>
            <div class="brand">
                <h1>ThumbTack</h1>
                <div class="subtitle">Multi-agent orchestration</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="/tasks" class="nav-item {% if request.url.path == '/tasks' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Tasks</span>
            </a>
            <a href="/terminals" class="nav-item {% if request.url.path == '/terminals' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                <span>Terminals</span>
            </a>
            {% if project_id is defined %}
            <div class="nav-divider"></div>
            <a href="/project/{{ project_id }}" class="nav-item {% if request.url.path == '/project/' ~ project_id %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                <span>Project</span>
            </a>
            {% endif %}
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-row">
                <button class="theme-toggle" id="themeToggleBtn" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>
            <div class="sidebar-footer-version">v1.1.0</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Modals -->
    {% block modals %}{% endblock %}

    <!-- Scripts -->
    <script src="/static/app.js"></script>
    <script>
    (function() {
        // Mobile menu toggle
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('mobileMenuBtn');
        if (btn && sidebar) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                sidebar.classList.toggle('open');
                btn.classList.toggle('active');
            });
            document.addEventListener('click', function(e) {
                if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !btn.contains(e.target)) {
                    sidebar.classList.remove('open');
                    btn.classList.remove('active');
                }
            });
        }

        // Theme toggle
        const themeBtn = document.getElementById('themeToggleBtn');
        const html = document.documentElement;
        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('thumbtack-theme', theme);
        }
        if (themeBtn) {
            themeBtn.addEventListener('click', function() {
                const current = html.getAttribute('data-theme') || 'dark';
                applyTheme(current === 'dark' ? 'light' : 'dark');
            });
        }
        const saved = localStorage.getItem('thumbtack-theme');
        if (saved) applyTheme(saved);
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
